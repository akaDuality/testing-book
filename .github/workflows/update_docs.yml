name: Update Documentation

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  SCHEME: "Book"
  DERIVED_DATA_PATH: './docs'
  DESTINATION: 'platform=iOS Simulator,name=iPhone 15'

jobs:
  update-docs:
    runs-on: macos-15
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
           xcode-version: latest

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          swift package --allow-writing-to-directory ${{ env.DERIVED_DATA_PATH }} generate-documentation --target ${{ env.SCHEME }} --disable-indexing --transform-for-static-hosting --hosting-base-path 'testing-book' --output-path ${{ env.DERIVED_DATA_PATH }}

      - name: Add redirect index.html
        run: |
          cat > ${{ env.DERIVED_DATA_PATH }}/index.html <<EOF
          <!DOCTYPE html>
          <html>
            <head>
              <meta http-equiv="refresh" content="0; url=/testing-book/documentation/book/">
            </head>
            <body>
              <p>Redirecting to <a href="/testing-book/documentation/book/">documentation</a>...</p>
            </body>
          </html>
          EOF

      - name: Create Cloudflare Pages project (if needed)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create testing-book --production-branch main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ env.DERIVED_DATA_PATH }} --project-name=testing-book
